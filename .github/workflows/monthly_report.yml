
name: NSE Monthly Report

on:
  schedule:
    # 1st of every month at 2:30 AM UTC = 8:00 AM IST
    - cron: "30 2 1 * *"

  workflow_dispatch:
    inputs:
      skip_email:
        description: "Generate reports without emailing (true/false)"
        required: false
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install BharatFinTrack pandas numpy openpyxl xlsxwriter requests

      - name: Download fresh data & generate reports
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_EMAIL: ${{ github.event.inputs.skip_email || 'false' }}
        run: python generate_report_ci.py

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nse-reports-${{ github.run_number }}
          path: reports/*.xlsx
          retention-days: 90

      - name: Commit updated data & reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv reports/*.xlsx || true
          git diff --staged --quiet || git commit -m "📊 Monthly report + data update — $(date +'%B %Y')"
          git push || true
